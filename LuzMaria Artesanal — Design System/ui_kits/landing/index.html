<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LuzMaria Artesanal — Velas devocionais feitas à mão</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--surface-page); -webkit-font-smoothing: antialiased; }
  @media (max-width: 900px) {
    .lm-hero-grid, .lm-story-grid { grid-template-columns: 1fr !important; }
    .lm-hero-img { display: none !important; }
    .lm-product-grid { grid-template-columns: 1fr !important; }
    .lm-navlinks a { display: none; }
  }
  @media (max-width: 640px) {
    .lm-product-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ProductGrid.jsx"></script>
<script type="text/babel" src="BrandStory.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel">
  function App() {
    return (
      <React.Fragment>
        <Nav />
        <Hero />
        <ProductGrid />
        <BrandStory />
        <FaqSection />
        <CtaBand />
        <Footer />
      </React.Fragment>
    );
  }
  function mount() {
    if (!window.Nav || !window.Hero || !window.ProductGrid || !window.BrandStory || !window.FaqSection) {
      return setTimeout(mount, 30);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  }
  mount();
</script>
</body>
</html>
