<!-- @dsCard group="Type" viewport="700x200" name="Display — Cormorant Garamond" subtitle="Illuminated serif for titles & hero" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink-900); padding: 24px 28px; }
  .eyebrow { font-family: var(--font-ui); font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-accent); margin-bottom: 10px; }
  .hero { font-family: var(--font-display); font-weight: 500; font-size: 58px; line-height: 1.05; color: var(--ivory-200); letter-spacing: -0.01em; margin: 0; }
  .sub { font-family: var(--font-display); font-weight: 600; font-size: 28px; color: var(--ivory-300); margin: 12px 0 0; }
  .spec { font-family: monospace; font-size: 11px; color: var(--ivory-600); margin-top: 14px; }
</style></head>
<body>
  <div class="eyebrow">Velas devocionais</div>
  <h1 class="hero">Iluminar momentos de fé</h1>
  <div class="sub">Feitas à mão, com propósito</div>
  <div class="spec">Cormorant Garamond · 500 / 600 · tracking -0.01em · leading 1.05–1.22</div>
</body></html>
