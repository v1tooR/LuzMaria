<!-- @dsCard group="Colors" viewport="700x150" name="Aged Gold" subtitle="Primary accent — reflected light, used sparingly" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink-900); padding: 18px; font-family: var(--font-ui); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--ink-600); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--ink-850); }
  .name { color: var(--ivory-300); font-size: 12px; font-weight: 600; }
  .hex { color: var(--ivory-600); font-size: 11px; font-family: monospace; margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gold-300)"></div><div class="meta"><div class="name">gold-300</div><div class="hex">#E2C765</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-400)"></div><div class="meta"><div class="name">gold-400</div><div class="hex">#D4B24A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-500)"></div><div class="meta"><div class="name">gold-500</div><div class="hex">#C9A227</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-600)"></div><div class="meta"><div class="name">gold-600</div><div class="hex">#B8860B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-700)"></div><div class="meta"><div class="name">gold-700</div><div class="hex">#8C6608</div></div></div>
  </div>
</body></html>
