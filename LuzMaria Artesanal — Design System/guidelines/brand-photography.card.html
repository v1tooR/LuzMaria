<!-- @dsCard group="Brand" viewport="700x230" name="Photography Direction" subtitle="Chiaroscuro: lit candle, warm side light, deep shadow" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink-900); padding: 22px; font-family: var(--font-ui); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .ph { aspect-ratio: 4/3; border-radius: var(--radius-md); border: 1px solid var(--border-card); position: relative; overflow: hidden; display: flex; align-items: flex-end; padding: 12px; }
  .a { background: radial-gradient(120% 90% at 30% 28%, rgba(201,162,39,0.34), rgba(201,162,39,0.06) 42%, #0a0908 72%); }
  .b { background: radial-gradient(130% 100% at 72% 40%, rgba(184,134,11,0.30), #100d0b 64%); }
  .c { background: radial-gradient(120% 90% at 50% 30%, rgba(122,42,44,0.42), #0c0a09 70%); }
  .cap { font-size: 11px; color: var(--ivory-300); position: relative; z-index: 1; }
  .note { margin-top: 14px; font-size: 12px; color: var(--ivory-500); line-height: 1.5; }
  .x { color: var(--gold-400); }
</style></head>
<body>
  <div class="grid">
    <div class="ph a"><span class="cap">Vela acesa · luz lateral quente</span></div>
    <div class="ph b"><span class="cap">Textura de cera · pavio · madeira</span></div>
    <div class="ph c"><span class="cap">Altar doméstico · flores secas</span></div>
  </div>
  <div class="note"><span class="x">Sim:</span> fundo escuro, sombras profundas, tom quente.&nbsp;&nbsp;<span class="x">Não:</span> fundo branco de e-commerce, luz fria, flatlay genérico.</div>
</body></html>
