<!-- @dsCard group="Colors" viewport="700x150" name="Bordô & Ivory" subtitle="Secondary wine accent + marfim text scale" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink-900); padding: 18px; font-family: var(--font-ui); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--ink-600); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--ink-850); }
  .name { color: var(--ivory-300); font-size: 11px; font-weight: 600; }
  .hex { color: var(--ivory-600); font-size: 10px; font-family: monospace; margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--wine-600)"></div><div class="meta"><div class="name">wine-600</div><div class="hex">#6B2230</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wine-700)"></div><div class="meta"><div class="name">wine-700</div><div class="hex">#5C1A1B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ivory-200)"></div><div class="meta"><div class="name">ivory-200</div><div class="hex">#F2EAD8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ivory-400)"></div><div class="meta"><div class="name">ivory-400</div><div class="hex">#D8CDB8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ivory-500)"></div><div class="meta"><div class="name">ivory-500</div><div class="hex">#B3A88F</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ivory-600)"></div><div class="meta"><div class="name">ivory-600</div><div class="hex">#8A7F6B</div></div></div>
  </div>
</body></html>
