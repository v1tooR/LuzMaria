<!-- @dsCard group="Brand" viewport="700x200" name="Ornament & Filete" subtitle="Baroque accent as exception — never a tiled pattern" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink-900); padding: 30px; display: flex; flex-direction: column; gap: 26px; align-items: center; }
  .filete { width: 70%; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-600) 18%, var(--gold-400) 50%, var(--gold-600) 82%, transparent); opacity: .8; }
  .node { display: flex; align-items: center; gap: 14px; color: var(--gold-500); }
  .node span { height: 1px; width: 120px; }
  .node .l { background: linear-gradient(90deg, transparent, var(--gold-500)); }
  .node .r { background: linear-gradient(90deg, var(--gold-500), transparent); }
  .label { font-family: var(--font-ui); font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ivory-600); }
</style></head>
<body>
  <div class="filete"></div>
  <div class="node">
    <span class="l"></span>
    <svg width="14" height="14" viewBox="0 0 14 14"><path d="M7 0 L9 5 L14 7 L9 9 L7 14 L5 9 L0 7 L5 5 Z" fill="currentColor"/></svg>
    <span class="r"></span>
  </div>
  <div class="label">Use entre blocos · com moderação · nunca como fundo repetido</div>
</body></html>
