<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="4px base rhythm" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink-900); padding: 22px 28px; font-family: var(--font-ui); }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .item { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }
  .bar { background: var(--gold-600); border-radius: 2px; }
  .t { font-size: 11px; color: var(--ivory-500); font-family: monospace; }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px;height:4px"></div><div class="t">1 · 4</div></div>
    <div class="item"><div class="bar" style="width:8px;height:8px"></div><div class="t">2 · 8</div></div>
    <div class="item"><div class="bar" style="width:12px;height:12px"></div><div class="t">3 · 12</div></div>
    <div class="item"><div class="bar" style="width:16px;height:16px"></div><div class="t">4 · 16</div></div>
    <div class="item"><div class="bar" style="width:24px;height:24px"></div><div class="t">5 · 24</div></div>
    <div class="item"><div class="bar" style="width:32px;height:32px"></div><div class="t">6 · 32</div></div>
    <div class="item"><div class="bar" style="width:48px;height:48px"></div><div class="t">7 · 48</div></div>
    <div class="item"><div class="bar" style="width:64px;height:64px"></div><div class="t">8 · 64</div></div>
  </div>
</body></html>
