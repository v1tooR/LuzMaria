<!-- @dsCard group="Brand" viewport="700x200" name="Wordmark" subtitle="Type-built logotype (no logo file was provided)" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink-900); padding: 28px; display: flex; gap: 40px; align-items: center; flex-wrap: wrap; }
  .mark { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 38px; color: var(--ivory-200); letter-spacing: 0.02em; line-height: 1; }
  .name .lower { font-style: italic; color: var(--gold-400); }
  .tag { font-family: var(--font-ui); font-size: 10px; text-transform: uppercase; letter-spacing: 0.34em; color: var(--ivory-500); }
  .ivorybox { background: var(--surface-ivory); padding: 22px 30px; border-radius: var(--radius-md); }
  .ivorybox .name { color: var(--ink-900); }
  .ivorybox .lower { color: var(--wine-700); }
  .ivorybox .tag { color: var(--text-on-ivory-muted); }
</style></head>
<body>
  <div class="mark">
    <div class="name">Luz<span class="lower">Maria</span></div>
    <div class="tag">Artesanal</div>
  </div>
  <div class="ivorybox">
    <div class="mark">
      <div class="name">Luz<span class="lower">Maria</span></div>
      <div class="tag">Artesanal</div>
    </div>
  </div>
</body></html>
