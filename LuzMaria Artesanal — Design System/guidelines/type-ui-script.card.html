<!-- @dsCard group="Type" viewport="700x180" name="UI / Labels — Inter & Script accent" subtitle="Functional sans + Pinyon Script for taglines only" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink-900); padding: 24px 28px; display: flex; flex-direction: column; gap: 18px; }
  .labels { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .lbl { font-family: var(--font-ui); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ivory-300); }
  .price { font-family: var(--font-ui); font-size: 19px; font-weight: 600; color: var(--gold-400); }
  .script { font-family: var(--font-script); font-size: 40px; color: var(--gold-400); line-height: 1; }
  .spec { font-family: monospace; font-size: 11px; color: var(--ivory-600); }
</style></head>
<body>
  <div class="labels">
    <span class="lbl">Quero encomendar</span>
    <span class="lbl">Como funciona</span>
    <span class="price">R$ 68,00</span>
  </div>
  <div class="script">com fé e carinho</div>
  <div class="spec">Inter 600 (UI/labels/prices) · Pinyon Script (taglines & signatures ONLY — never buttons)</div>
</body></html>
