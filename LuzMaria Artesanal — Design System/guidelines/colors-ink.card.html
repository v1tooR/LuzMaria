<!-- @dsCard group="Colors" viewport="700x150" name="Backgrounds — Ink" subtitle="Deep graphite page & surface scale" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #060504; padding: 18px; font-family: var(--font-ui); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--ink-600); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--ink-850); }
  .name { color: var(--ivory-300); font-size: 12px; font-weight: 600; }
  .hex { color: var(--ivory-600); font-size: 11px; font-family: monospace; margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="meta"><div class="name">ink-900</div><div class="hex">#0E0D0C</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-850)"></div><div class="meta"><div class="name">ink-850</div><div class="hex">#131110</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="meta"><div class="name">ink-800</div><div class="hex">#1A1715</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="meta"><div class="name">ink-700</div><div class="hex">#221E1B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><div class="meta"><div class="name">ink-600</div><div class="hex">#2E2823</div></div></div>
  </div>
</body></html>
